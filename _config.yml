title: "The BioHub"
description: "A shared bioindustrial manufacturing facility at Gateway Park in Worcester — pilot-scale fermentation, automated strain engineering, and bioprocess development under one roof. Led by WPI and MBI, funded by MassTech."
url: "https://massbiohub.org"
baseurl: ""

markdown: kramdown
permalink: pretty

plugins:
  - jekyll-sitemap

# Don't render internal/dev files into the public site.
# These files stay in the repo for tooling (Claude Code, contributors) but
# are never served at massbiohub.org/<filename>/.
exclude:
  - CLAUDE.md
  - SITE_PLAN.md
  - AUDIT.md
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - .jekyll-cache/

# Org metadata used in structured data
org:
  legal_name: "The BioHub"
  same_as:
    - "https://www.wpi.edu/"
    - "https://mbi.bio/"
    - "https://masstech.org/"
