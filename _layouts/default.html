<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}" />
    <link rel="canonical" href="{{ page.url | absolute_url }}" />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{ page.url | absolute_url }}" />
    <meta property="og:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}" />
    <meta property="og:description" content="{{ page.description | default: site.description | escape }}" />
    <meta property="og:image" content="{{ '/assets/img/logos/og-default.png' | absolute_url }}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}" />
    <meta name="twitter:description" content="{{ page.description | default: site.description | escape }}" />
    <meta name="twitter:image" content="{{ '/assets/img/logos/og-default.png' | absolute_url }}" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "{{ site.title }}",
      "url": "{{ site.url }}",
      "logo": "{{ '/assets/img/logos/biohub_logo.png' | absolute_url }}",
      "description": "{{ site.description | escape }}",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "60 Prescott Street",
        "addressLocality": "Worcester",
        "addressRegion": "MA",
        "postalCode": "01605",
        "addressCountry": "US"
      },
      "sameAs": [
        "https://www.wpi.edu/",
        "https://mbi.bio/",
        "https://masstech.org/"
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" sizes="96x96" href="{{ '/assets/img/favicon/favicon-96x96.png' | relative_url }}" />
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon/favicon.svg' | relative_url }}" />
    <link rel="shortcut icon" href="{{ '/assets/img/favicon/favicon.ico' | relative_url }}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/img/favicon/apple-touch-icon.png' | relative_url }}" />
    <link rel="manifest" href="{{ '/assets/img/favicon/site.webmanifest' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>

  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    {% include nav.html %}

    <main id="main" class="container">
      {{ content }}
    </main>

    {% include footer.html %}

    <script data-goatcounter="https://biohub.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
  </body>
</html>
